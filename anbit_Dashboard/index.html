<!DOCTYPE html>
<html lang="el" class="text-[12px] sm:text-[13px] md:text-[14px] lg:text-[15px] xl:text-[16px]">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Anbit Business - Tactical Command</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='bold' fill='%23e63533'>A</text></svg>">

  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'anbit-dark': '#09090b',
            /* Χρώματα ευθυγραμμισμένα με το wallet light mode (Pax Burgers / κόκκινο) */
            'anbit-soft-bg': '#f3f4f6',
            'anbit-card': '#ffffff',
            'anbit-border': 'rgba(0,0,0,0.08)',
            'anbit-yellow': '#E63533',
            'anbit-red': '#E63533',
            'anbit-text': '#333333',
            'anbit-muted': '#666666',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
            anbit: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
            'playpen-sans': ['"Plus Jakarta Sans"', 'Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'card-soft': '0 12px 30px rgba(15, 23, 42, 0.08)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f3f4f6;
      color: #333333;
      margin: 0;
      overflow-x: hidden;
      font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* Dashboard-specific overrides: professional upright style, no italic */
    .font-anbit-display {
      font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif !important;
      font-style: normal !important;
      font-weight: 700 !important;
      letter-spacing: -0.025em !important;
      line-height: 1.2 !important;
      font-size: 1em !important;
    }

    .font-anbit-brand {
      font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif !important;
      font-style: normal !important;
      font-weight: 800 !important;
      letter-spacing: -0.03em !important;
    }

    /* Tighten headings */
    h1, h2, h3, h4, h5, h6 {
      font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    /* Tabular numbers: Plus Jakarta Sans has tabular figures */
    .anbit-tabular-nums {
      font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif !important;
      font-variant-numeric: tabular-nums;
      font-style: normal !important;
    }

    /* Λευκές κάρτες τύπου wallet */
    .glass-tactical {
      background: #ffffff;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      border-radius: 18px;
    }

    .neon-text-glow-yellow {
      text-shadow: none;
    }

    .particle-yellow {
      display: none;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "framer-motion": "https://esm.sh/framer-motion@^12.29.2",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
